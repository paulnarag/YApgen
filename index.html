<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <h1>YApgen</h1>
    <div id="passwordGenerator">
        <div id="passwordBox">
            <input type="password" readonly id="passwordOutput">
            <button id="togglePasswordButton">
                <i class="fa-solid fa-eye"></i>
            </button>
        </div>

    

        <div id="lengthControl">
            <input type="range" min="12" max="50" step="1" value="12" id="lengthSlider">
            <p id="lengthOutput"></p>
        </div>
       
        <div id="optionContainer">
            <div class="optionRow">
                <input type="checkbox" id="includeUppercase" name="includeUppercase" value="yes">
                <label for="includeUppercase">Include uppercase</label>
            </div>
            <div class="optionRow">
                <input type="checkbox" id="includeNumbers" name="includeNumbers" value="yes">
                <label for="includeNumbers">Include numbers</label>
            </div>
            <div class="optionRow">
                <input type="checkbox" id="includeSymbols" name="includeSymbols" value="yes">
                <label for="includeSymbols">Include symbols</label>
            </div>
        </div>

        <div id="actionButtons">
            <button id="copyButton">Copy to clipboard</button>
            <button id="generateButton">Generate</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
